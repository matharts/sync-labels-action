name: Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node 24
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting, lint, types, behavior, and immutable Action references
        run: pnpm check

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && hashFiles('test-results/junit.xml') != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./test-results/junit.xml
          report_type: test_results
          use_oidc: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./coverage/lcov.info
          use_oidc: true

      - name: Build the Action bundle
        run: pnpm build

      - name: Verify the committed bundle
        run: git diff --exit-code -- dist

      - name: Lint GitHub Actions workflows
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/actionlint.tar.gz"
          curl --fail --silent --show-error --location \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            --output "${archive}"
          echo "${ACTIONLINT_SHA256}  ${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "${archive}" --directory "${RUNNER_TEMP}" actionlint
          "${RUNNER_TEMP}/actionlint" -color
