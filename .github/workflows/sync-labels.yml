name: Apply organization labels

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "只同步 Allowlist 中的指定仓库；留空同步全部"
        required: false
        type: string
        default: ""

      confirm_apply:
        description: "确认执行真实标签变更"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: apply-organization-labels
  cancel-in-progress: false

jobs:
  apply-labels:
    name: Apply organization label changes
    if: ${{ github.ref == 'refs/heads/main' && inputs.confirm_apply }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: label-governance-production

    steps:
      - name: Checkout governance repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Create label synchronization token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Apply MathArts label synchronization
        uses: ./
        with:
          token: ${{ steps.app-token.outputs.token }}
          owner: ${{ github.repository_owner }}
          config_file: ".github/labels.yml"
          policy_file: ".github/label-policy.yml"
          dry_run: "false"
          repository: ${{ inputs.repository }}
