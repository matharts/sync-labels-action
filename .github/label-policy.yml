version: 1

managed:
  # 这些前缀定义组织拥有的标签命名空间。删除前缀下的正式标签后，
  # 同步器仍会清理各仓库中遗留的同前缀标签。
  prefixes:
    - "type:"
    - "status:"
    - "priority:"
    - "impact:"
    - "process:"
    - "resolution:"

  # 没有组织前缀、但由 MathArts 统一管理的约定标签。
  exact_names:
    - "good first issue"
    - "help wanted"
    - "needs-triage"
    - "needs-info"
    - "ready-for-agent"
    - "ready-for-human"
    - "wontfix"

  # 组织曾经拥有且仍需清理的旧标签名。
  # 从 labels.yml 的 aliases 中移除迁移映射后，也应暂时保留在这里，
  # 直到所有合格组织仓库都确认完成清理。
  legacy_names:
    - "bug"
    - "enhancement"
    - "documentation"
    - "duplicate"

safety:
  # 2026-07-15 的全组织预览覆盖 6 个合格仓库，计划删除为 0。
  # 允许一次受审查的单标签清理；批量删除必须先单独调整并审查阈值。
  deletions: allow
  max_deletions_per_repository: 1
  max_deletions_total: 6
