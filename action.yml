name: "MathArts Sync Labels"
description: "按组织策略同步受管标签，同时保留仓库自行维护的扩展标签"
author: "MathArts"

branding:
  icon: "tag"
  color: "purple"

inputs:
  token:
    description: "可以读取组织仓库并管理仓库标签的令牌"
    required: true

  owner:
    description: "需要同步的 GitHub 组织名称"
    required: true

  config_file:
    description: "权威标签配置文件路径"
    required: false
    default: ".github/labels.yml"

  policy_file:
    description: "标签所有权和仓库范围策略文件路径"
    required: false
    default: ".github/label-policy.yml"

  dry_run:
    description: "仅预览变更，不实际修改标签"
    required: false
    default: "true"

  repository:
    description: "只同步指定仓库；留空时按 include 选择，未配置 include 则同步全部合格仓库"
    required: false
    default: ""

  api_url:
    description: "GitHub REST API HTTPS 地址；可用于可信的 GitHub Enterprise Server"
    required: false
    default: "https://api.github.com"

outputs:
  changed:
    description: "是否检测到或执行了任何新建、更新、重命名或删除"
  repositories:
    description: "本次处理的仓库数量"
  created:
    description: "新建标签总数"
  updated:
    description: "更新标签总数"
  renamed:
    description: "重命名标签总数"
  deleted:
    description: "删除标签总数"
  unchanged:
    description: "无需变更的受管标签总数"
  preserved:
    description: "保留的仓库扩展标签总数"
  failures:
    description: "同步失败的仓库数量"

runs:
  using: "node24"
  main: "dist/index.js"
